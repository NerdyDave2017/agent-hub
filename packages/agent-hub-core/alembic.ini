# Alembic — lives with ORM in `agent-hub-core` (Phase 2).
# From repo root:
#   uv run --package agent-hub-core alembic -c packages/agent-hub-core/alembic.ini upgrade head

[alembic]
script_location = %(here)s/src/agent_hub_core/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
