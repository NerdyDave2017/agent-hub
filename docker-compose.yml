# Local Development Docker Compose Configuration
#
# Services
# ---------
# * **postgres** — hub + worker share the same DB in local dev (`docs/plan.md`).
# * **localstack** — SQS + IAM + STS + Secrets Manager for Terraform + app parity; init
#   hooks under `scripts/localstack-init/ready.d/` (queue creation is Terraform — see
#   Makefile `local-provision`). Hub/worker use `AWS_ENDPOINT_URL` (host vs compose below).
# * **hub** — FastAPI control plane (`backend/Dockerfile`); runs Alembic then `uvicorn`.
# * **worker** — SQS consumer (`worker/Dockerfile`); does **not** run migrations.

services:
  postgres:
    image: postgres:15
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      # Minimum for Terraform (`infra/localstack`) + boto3 in hub/worker. Add ecs,ecr,elbv2 if you exercise those adapters against LocalStack.
      SERVICES: sqs,iam,sts,secretsmanager
      DEBUG: 0
    volumes:
      - ./scripts/localstack-init:/etc/localstack/init
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:4566/_localstack/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  hub:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/postgres
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      # After `make local-provision`, use: docker compose --env-file localstack.auto.env up hub
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-http://localstack:4566/000000000000/agent-hub-jobs}
      SQS_DLQ_URL: ${SQS_DLQ_URL:-http://localstack:4566/000000000000/agent-hub-jobs-dlq}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/postgres
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-http://localstack:4566/000000000000/agent-hub-jobs}
      SQS_DLQ_URL: ${SQS_DLQ_URL:-http://localstack:4566/000000000000/agent-hub-jobs-dlq}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # Incident triage agent — FastAPI + settings only for now (`agents/incident-triage/README.md`).
  incident-triage:
    build:
      context: .
      dockerfile: agents/incident-triage/Dockerfile
    ports:
      - "8001:8001"
    environment:
      APP_NAME: incident-triage
      API_V1_PREFIX: /api/v1

volumes:
  postgres_data:
