name: Apply Hub
description: Apply infra/hub Terraform root (SQS + hub App Runner).
inputs:
  environment:
    required: true
    description: Terraform environment value.
  aws-region:
    required: true
    description: AWS region.
  aws-account-id:
    required: true
    description: AWS account ID.
  hub-image-uri:
    required: true
    description: Full hub image URI used by Terraform.
  worker-role-arn:
    required: true
    description: Worker task role ARN. Pass empty for initial apply.
  frontend-url:
    required: true
    description: Frontend URL.
  google-pubsub-topic:
    required: true
    description: Google pub/sub topic.
  gcp-project-id:
    required: true
    description: GCP project ID.
  google-oauth-client-id:
    required: true
    description: Google OAuth client ID.
  google-oauth-client-secret:
    required: true
    description: Google OAuth client secret.
  google-webhook-secret:
    required: true
    description: Google webhook secret.
  slack-oauth-client-id:
    required: true
    description: Slack OAuth client ID.
  slack-oauth-client-secret:
    required: true
    description: Slack OAuth client secret.
  langfuse-host:
    required: false
    description: Langfuse host.
    default: "https://cloud.langfuse.com"
  hub-public-url:
    required: false
    description: Hub API public URL (TF_VAR_hub_public_url). Use the App Runner https URL or a custom domain; avoid empty (Terraform would treat TF_VAR as blank).
    default: "http://127.0.0.1:8000"
runs:
  using: composite
  steps:
    - name: Apply hub root
      uses: ./.github/actions/tf-apply-root
      with:
        working-directory: infra/hub
      env:
        TF_VAR_environment: ${{ inputs.environment }}
        TF_VAR_aws_region: ${{ inputs.aws-region }}
        TF_VAR_aws_account_id: ${{ inputs.aws-account-id }}
        TF_VAR_hub_image_uri: ${{ inputs.hub-image-uri }}
        TF_VAR_worker_role_arn: ${{ inputs.worker-role-arn }}
        TF_VAR_frontend_url: ${{ inputs.frontend-url }}
        TF_VAR_google_pubsub_topic: ${{ inputs.google-pubsub-topic }}
        TF_VAR_gcp_project_id: ${{ inputs.gcp-project-id }}
        TF_VAR_google_oauth_client_id: ${{ inputs.google-oauth-client-id }}
        TF_VAR_google_oauth_client_secret: ${{ inputs.google-oauth-client-secret }}
        TF_VAR_google_webhook_secret: ${{ inputs.google-webhook-secret }}
        TF_VAR_slack_oauth_client_id: ${{ inputs.slack-oauth-client-id }}
        TF_VAR_slack_oauth_client_secret: ${{ inputs.slack-oauth-client-secret }}
        TF_VAR_langfuse_host: ${{ inputs.langfuse-host }}
        TF_VAR_hub_public_url: ${{ inputs.hub-public-url }}
