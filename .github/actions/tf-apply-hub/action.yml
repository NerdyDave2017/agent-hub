name: Apply Hub
description: Apply infra/hub Terraform root (SQS + hub App Runner).
inputs:
  environment:
    required: true
    description: Terraform environment value.
  aws-region:
    required: true
    description: AWS region.
  aws-account-id:
    required: true
    description: AWS account ID.
  hub-image-uri:
    required: true
    description: Full hub image URI used by Terraform.
  worker-role-arn:
    required: true
    description: Worker task role ARN. Pass empty for initial apply.
  frontend-url:
    required: true
    description: Frontend URL.
  gmail-pubsub-topic:
    required: true
    description: Gmail pub/sub topic.
  gcp-project-id:
    required: true
    description: GCP project ID.
  gmail-oauth-client-id:
    required: true
    description: Gmail OAuth client ID.
  gmail-oauth-client-secret:
    required: true
    description: Gmail OAuth client secret.
  gmail-webhook-secret:
    required: true
    description: Gmail webhook secret.
  slack-oauth-client-id:
    required: true
    description: Slack OAuth client ID.
  slack-oauth-client-secret:
    required: true
    description: Slack OAuth client secret.
runs:
  using: composite
  steps:
    - name: Apply hub root
      uses: ./.github/actions/tf-apply-root
      with:
        working-directory: infra/hub
      env:
        TF_VAR_environment: ${{ inputs.environment }}
        TF_VAR_aws_region: ${{ inputs.aws-region }}
        TF_VAR_aws_account_id: ${{ inputs.aws-account-id }}
        TF_VAR_hub_image_uri: ${{ inputs.hub-image-uri }}
        TF_VAR_worker_role_arn: ${{ inputs.worker-role-arn }}
        TF_VAR_frontend_url: ${{ inputs.frontend-url }}
        TF_VAR_gmail_pubsub_topic: ${{ inputs.gmail-pubsub-topic }}
        TF_VAR_gcp_project_id: ${{ inputs.gcp-project-id }}
        TF_VAR_gmail_oauth_client_id: ${{ inputs.gmail-oauth-client-id }}
        TF_VAR_gmail_oauth_client_secret: ${{ inputs.gmail-oauth-client-secret }}
        TF_VAR_gmail_webhook_secret: ${{ inputs.gmail-webhook-secret }}
        TF_VAR_slack_oauth_client_id: ${{ inputs.slack-oauth-client-id }}
        TF_VAR_slack_oauth_client_secret: ${{ inputs.slack-oauth-client-secret }}
