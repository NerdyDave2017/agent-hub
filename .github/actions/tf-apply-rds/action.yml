name: Apply RDS
description: Apply infra/rds Terraform root.
inputs:
  environment:
    required: true
    description: Terraform environment value.
  aws-region:
    required: true
    description: AWS region.
  db-password:
    required: true
    description: Database password for TF_VAR_db_password.
runs:
  using: composite
  steps:
    - name: Apply rds root
      uses: ./.github/actions/tf-apply-root
      with:
        working-directory: infra/rds
      env:
        TF_VAR_environment: ${{ inputs.environment }}
        TF_VAR_aws_region: ${{ inputs.aws-region }}
        TF_VAR_db_password: ${{ inputs.db-password }}
