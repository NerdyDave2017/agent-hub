# Tear down AWS stacks managed by this repo (reverse of apply order).
#
# Prerequisites
# -------------
# - OIDC role (secret AWS_ROLE_TO_ASSUME) must allow: terraform destroy on each root, S3 state
#   read/write, DynamoDB locks, and full resource deletion for those modules.
# - Configure GitHub **Variables** / **Secrets** so every TF_VAR_* below resolves (same names as
#   `.github/workflows/terraform.yml` validate job, plus real secrets for prod).
#
# Apply order (for reference): vpc → secrets → rds → hub → worker → agents/incident-triage
# Destroy order (this workflow): agents → worker → hub → rds → secrets → vpc
#
# Does NOT destroy: infra/ci-oidc (would break GitHub OIDC), infra/localstack.
name: Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment name (must match state, e.g. staging, production)"
        required: true
        type: choice
        options:
          - staging
          - production
      confirmation:
        description: "Must be exactly DESTROY-<ENVIRONMENT> in upper case (e.g. DESTROY-STAGING)"
        required: true
        type: string

concurrency:
  group: destroy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: "false"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_environment: ${{ inputs.environment }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
  TF_VAR_hub_image_uri: ${{ vars.TF_VAR_hub_image_uri }}
  TF_VAR_worker_image_uri: ${{ vars.TF_VAR_worker_image_uri }}
  TF_VAR_frontend_url: ${{ vars.TF_VAR_frontend_url }}
  TF_VAR_gmail_pubsub_topic: ${{ vars.TF_VAR_gmail_pubsub_topic }}
  TF_VAR_gcp_project_id: ${{ vars.TF_VAR_gcp_project_id }}
  TF_VAR_gmail_oauth_client_id_arn: ${{ vars.TF_VAR_gmail_oauth_client_id_arn }}
  TF_VAR_gmail_oauth_client_secret_arn: ${{ vars.TF_VAR_gmail_oauth_client_secret_arn }}
  TF_VAR_gmail_webhook_secret_arn: ${{ vars.TF_VAR_gmail_webhook_secret_arn }}
  TF_VAR_slack_oauth_client_id_arn: ${{ vars.TF_VAR_slack_oauth_client_id_arn }}
  TF_VAR_slack_oauth_client_secret_arn: ${{ vars.TF_VAR_slack_oauth_client_secret_arn }}
  TF_VAR_ecr_registry: ${{ vars.TF_VAR_ecr_registry }}
  TF_VAR_github_organization: ${{ vars.TF_VAR_github_organization }}
  TF_VAR_github_repository: ${{ vars.TF_VAR_github_repository }}
  TF_VAR_staging_tenant_id: ${{ vars.TF_VAR_staging_tenant_id }}
  TF_VAR_staging_agent_id: ${{ vars.TF_VAR_staging_agent_id }}
  TF_VAR_availability_zones: ${{ vars.TF_VAR_availability_zones || '["us-east-1a","us-east-1b"]' }}

jobs:
  destroy:
    name: Destroy all application stacks
    runs-on: ubuntu-latest
    steps:
      - name: Guard — confirmation phrase
        run: |
          up=$(echo "${{ inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          expect="DESTROY-$up"
          got="${{ inputs.confirmation }}"
          if [ "$got" != "$expect" ]; then
            echo "::error::confirmation must be exactly: $expect (matching environment case-insensitively)"
            exit 1
          fi

      - name: Guard — required configuration
        run: |
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "::error::Set GitHub variable AWS_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "${{ secrets.TF_VAR_db_password }}" ]; then
            echo "::error::Set repository secret TF_VAR_db_password (needed for RDS destroy state)"
            exit 1
          fi
          if [ -z "${{ vars.TF_VAR_hub_image_uri }}" ]; then
            echo "::error::Set GitHub variable TF_VAR_hub_image_uri"
            exit 1
          fi
          if [ -z "${{ vars.TF_VAR_worker_image_uri }}" ]; then
            echo "::error::Set GitHub variable TF_VAR_worker_image_uri"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Destroy agents/incident-triage
        working-directory: infra/agents/incident-triage
        run: |
          terraform init -input=false
          terraform destroy -auto-approve

      - name: Destroy worker
        working-directory: infra/worker
        run: |
          terraform init -input=false
          terraform destroy -auto-approve

      - name: Destroy hub
        working-directory: infra/hub
        run: |
          terraform init -input=false
          terraform destroy -auto-approve

      - name: Destroy RDS
        working-directory: infra/rds
        run: |
          terraform init -input=false
          terraform destroy -auto-approve

      - name: Destroy secrets
        working-directory: infra/secrets
        run: |
          terraform init -input=false
          terraform destroy -auto-approve

      - name: Destroy VPC
        working-directory: infra/vpc
        run: |
          terraform init -input=false
          terraform destroy -auto-approve
