# Phase 9 — hub + shared kernel (see `response.md`).
name: Backend

on:
  push:
    paths:
      - "backend/**"
      - "packages/agent-hub-core/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "packages/agent-hub-core/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace (with dev tools)
        run: uv sync --frozen --group dev

      - name: Import shared kernel
        run: uv run --package agent-hub-core python -c "import
          agent_hub_core.config.settings; import agent_hub_core.db.models"

      - name: Import hub application
        run: uv run --package agent-hub-backend --directory backend python -c "import
          main; import apis.agents; import apis.jobs; import apis.tenants"

      - name: Byte-compile hub
        run: uv run --package agent-hub-backend --directory backend python -m compileall
          -q apis services main.py

      - name: Run tests
        run: uv run --group dev pytest -q
